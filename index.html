<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Curling Simulator</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&display=swap');

      :root {
        color-scheme: dark;
        font-family: 'VT323', monospace;
        background: #050507;
        color: #f5f8fd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 12%, rgba(0, 255, 255, 0.16), transparent 24%),
          radial-gradient(circle at 82% 14%, rgba(255, 0, 64, 0.16), transparent 26%),
          linear-gradient(180deg, #09090d 0%, #050507 55%, #030305 100%);
        text-shadow: 0 0 14px rgba(0, 255, 255, 0.05);
      }

      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
  </html>
